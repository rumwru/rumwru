<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rumwru</title>

<style>
:root {
    --bg-primary: #0f1419;
    --text-primary: #e0e0e0;
    --accent: #00d4ff;

    --nav-bg: rgba(7, 17, 35, 0.7);
    --nav-text: #e0e0e0;
    --nav-border: rgba(0, 212, 255, 0.3);
}

html.light-mode {
    --bg-primary: #ffffff;
    --text-primary: #1f3a57;
    --accent: #0078d4;

    --nav-bg: rgba(225, 236, 249, 0.8);
    --nav-text: #1f3a57;
    --nav-border: rgba(0, 120, 212, 0.25);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: 0.3s;
}

/* NAVBAR */
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    margin: 20px;
    border-radius: 16px;

    background: var(--nav-bg);
    border: 1px solid var(--nav-border);
    backdrop-filter: blur(10px);
}

/* BRAND */
.brand {
    font-weight: bold;
    color: var(--accent);
}

.brand-vibe {
    color: var(--nav-text);
}

/* MENU */
.desktop-menu {
    display: flex;
    gap: 25px;
}

.desktop-menu a {
    text-decoration: none;
    color: var(--nav-text); /* ✅ FIX */
    font-weight: 600;
    transition: 0.2s;
}

.desktop-menu a:hover {
    color: var(--accent);
}

/* TOGGLE */
.theme-toggle {
    border: none;
    background: var(--accent);
    color: #000;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
}

/* CONTENT */
.container {
    padding: 40px;
}

.card {
    padding: 30px;
    border-radius: 12px;
    border: 1px solid var(--nav-border);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
    <div class="brand">
        rumwru <span class="brand-vibe">| vibe coder</span>
    </div>

    <div class="desktop-menu">
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Skills</a>
        <a href="#">Contact</a>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="card">
        <h2 style="color: var(--accent);">About</h2>
        <p>
            I'm a developer and creator passionate about open-source projects and minimalist design.
        </p>
    </div>
</div>

<script>
function toggleTheme() {
    document.documentElement.classList.toggle("light-mode");

    // optional: simpan ke localStorage
    if (document.documentElement.classList.contains("light-mode")) {
        localStorage.setItem("theme", "light");
    } else {
        localStorage.setItem("theme", "dark");
    }
}

// load theme
if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light-mode");
}
</script>

</body>
</html>
